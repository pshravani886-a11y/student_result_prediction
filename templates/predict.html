<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Result Prediction</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
}

.navbar{
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.card{
border:none;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.15);
}

.card-header{
background:#4e73df;
color:white;
font-weight:600;
font-size:20px;
text-align:center;
border-radius:15px 15px 0 0;
}

.btn-predict{
background:#1cc88a;
border:none;
font-weight:500;
}

.btn-predict:hover{
background:#17a673;
}

.form-label{
font-weight:500;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-graph-up"></i> Result Predictor
</a>

<a href="/" class="btn btn-outline-light">
<i class="bi bi-house"></i> Home
</a>

</div>

</nav>


<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-header">
<i class="bi bi-person-lines-fill"></i> Student Details
</div>

<div class="card-body">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Gender</label>
<select class="form-select" name="gender">
<option value="0">Female</option>
<option value="1">Male</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Age</label>
<input type="number" class="form-control" name="age" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Study Hours</label>
<input type="number" step="0.1" class="form-control" name="study_hours" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Attendance (%)</label>
<input type="number" step="0.1" class="form-control" name="attendance" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Previous Grade</label>
<input type="number" step="0.1" class="form-control" name="previous_grade" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Assignments Completed</label>
<input type="number" class="form-control" name="assignments" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Parental Education</label>
<input type="number" class="form-control" name="parental_education" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Internet Access</label>
<select class="form-select" name="internet_access">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Extracurricular Participation</label>
<select class="form-select" name="extracurricular_participation">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Final Exam Score</label>
<input type="number" step="0.1" class="form-control" name="final_exam_score" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Sleep Hours</label>
<input type="number" step="0.1" class="form-control" name="sleep_hours" required>
</div>

</div>

<button type="submit" class="btn btn-predict w-100 mt-3">
<i class="bi bi-lightning-charge"></i> Predict Score
</button>

</form>

{% if prediction_text %}

<div class="alert alert-success text-center mt-4">

<h4>
<i class="bi bi-check-circle"></i>
{{ prediction_text }}
</h4>

</div>

{% endif %}

</div>

</div>

</div>

</div>

</div>

</body>

</html>
